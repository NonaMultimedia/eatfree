<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#6db049">
    <title>Vendor Login | EatFree</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css?v=2" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css?v=2">
    <!-- Custom Fonts -->
    <link rel="stylesheet" href="assets/css/Cooper%20Black%20Regular.css?v=2">
    <link rel="stylesheet" href="assets/css/Montserrat.css?v=2">
    <link rel="stylesheet" href="assets/css/Kaushan%20Script.css?v=2">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/istyle3.css?v=2"> 
    
    <style>
        .login-page {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--ef-primary) 0%, #5a9a3d 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .login-card {
            background: var(--ef-white);
            border-radius: var(--ef-radius-lg);
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--ef-shadow-xl);
            animation: modalSlideUp 0.5s ease;
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-icon {
            width: 80px;
            height: 80px;
            background: var(--ef-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            color: var(--ef-white);
            font-size: 2.5rem;
        }
        .login-title {
            font-family: 'Cooper Black Regular', serif;
            color: var(--ef-primary);
            margin-bottom: 0.5rem;
        }
        .login-subtitle {
            color: var(--ef-gray-500);
        }
        .btn-login {
            background: var(--ef-primary);
            color: var(--ef-white);
            padding: 1rem;
            border-radius: 50px;
            font-weight: 600;
            border: none;
            width: 100%;
            transition: var(--ef-transition);
        }
        .btn-login:hover {
            background: var(--ef-primary-dark);
            transform: translateY(-2px);
        }
        .login-links {
            text-align: center;
            margin-top: 1.5rem;
        }
        .login-links a {
            color: var(--ef-primary);
            text-decoration: none;
        }
        .login-links a:hover {
            text-decoration: underline;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--ef-gray-300);
        }
        .divider span {
            padding: 0 1rem;
            color: var(--ef-gray-500);
            font-size: 0.875rem;
        }
        .admin-link {
            text-align: center;
            margin-top: 1rem;
        }
        .admin-link a {
            color: var(--ef-gray-500);
            font-size: 0.875rem;
            text-decoration: none;
        }
        .admin-link a:hover {
            color: var(--ef-primary);
        }
        @keyframes modalSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">
                    <i class="bi bi-shop"></i>
                </div>
                <h2 class="login-title">Vendor Login</h2>
                <p class="login-subtitle">Sign in to manage your meals and view statements</p>
            </div>
            
            <form id="vendorLoginForm">
                <div class="ef-input-group">
                    <label class="ef-label">Email Address</label>
                    <div class="ef-input-icon">
                        <i class="bi bi-envelope"></i>
                        <input type="email" id="email" class="ef-input" placeholder="vendor@example.com" required autocomplete="email">
                    </div>
                </div>
                
                <div class="ef-input-group">
                    <label class="ef-label">Password</label>
                    <div class="ef-input-wrapper">
                        <input type="password" id="password" class="ef-input" placeholder="Enter your password" required>
                        <button type="button" class="ef-toggle-password" onclick="togglePassword()">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div id="errorMessage" class="alert alert-danger" style="display: none;">
                    <i class="bi bi-exclamation-triangle me-2"></i><span id="errorText"></span>
                </div>
                
                <button type="submit" class="btn-login">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>
            </form>
            
            <div class="divider">
                <span>OR</span>
            </div>
            
            <div class="login-links">
                <p>Don't have an account? <a href="vendor-register.html">Register as Vendor</a></p>
            </div>
            
            <div class="admin-link">
                <a href="admin-login.php"><i class="bi bi-shield-lock me-1"></i>Admin Login</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const API_BASE = 'api/';
        
        // Toggle password visibility
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.querySelector('.ef-toggle-password i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }
        
        // Form submission
        document.getElementById('vendorLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="bi bi-arrow-repeat spin"></i> Signing in...';
            btn.disabled = true;
            
            // Hide error message
            document.getElementById('errorMessage').style.display = 'none';
            
            try {
                const response = await fetch(API_BASE + 'vendor-login.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Cache-Control': 'no-cache'
                    },
                    cache: 'no-store',
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // Store vendor data
                    localStorage.setItem('eatfree_vendor', JSON.stringify(result.data));
                    // Redirect to dashboard
                    window.location.href = result.data.redirect_url || '/vendor/dashboard.php';
                } else {
                    document.getElementById('errorText').textContent = result.message || 'Invalid email or password';
                    document.getElementById('errorMessage').style.display = 'block';
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('errorText').textContent = 'Network error. Please try again.';
                document.getElementById('errorMessage').style.display = 'block';
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
